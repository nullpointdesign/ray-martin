<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ray Martin — Guitar / Nashville</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Special+Elite&family=Oswald:wght@200;300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --ink:      #0e0b07;
  --tobacco:  #1a1108;
  --bourbon:  #271608;
  --amber:    #c8841a;
  --gold:     #e8a832;
  --rust:     #7a2e0e;
  --cream:    #ede0c8;
  --aged:     #c4aa84;
  --smoke:    #7a6e5a;
  --paper:    #d4b896;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--ink);
  color: var(--cream);
  font-family: 'Libre Baskerville', Georgia, serif;
  overflow-x: hidden;
}

/* ── GRAIN + PAPER TEXTURE ── */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.055;
  pointer-events: none;
  z-index: 9999;
}

/* ══════════════════════════════
   NAV
══════════════════════════════ */
nav {
  position: fixed; top:0; left:0; right:0; z-index:500;
  display: flex; justify-content:space-between; align-items:center;
  padding: 1.1rem 3rem;
  background: linear-gradient(to bottom, rgba(10,7,3,0.97) 0%, transparent 100%);
}
.nav-wordmark {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  letter-spacing: 0.18em;
  color: var(--amber);
  text-decoration: none;
}
.nav-links { display:flex; gap:2.5rem; list-style:none; }
.nav-links a {
  font-family: 'Oswald', sans-serif; font-weight:300;
  font-size: 0.72rem; letter-spacing:0.3em; text-transform:uppercase;
  color: var(--aged); text-decoration:none; transition: color 0.25s;
}
.nav-links a:hover { color: var(--gold); }

/* ══════════════════════════════
   HERO — full concert-poster layout
══════════════════════════════ */
.hero {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  position: relative;
  overflow: hidden;
}

.hero-text-col {
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 7rem 3rem 5rem 5rem;
  position: relative; z-index: 2;
  background: linear-gradient(to right, rgba(14,11,7,0.98) 60%, rgba(14,11,7,0.7) 100%);
}

.poster-rule {
  width: 100%;
  height: 3px;
  background: linear-gradient(to right, var(--amber), transparent);
  margin-bottom: 1.2rem;
}
.poster-rule.thin {
  height: 1px;
  background: linear-gradient(to right, rgba(200,132,26,0.5), transparent);
  margin-bottom: 0.6rem; margin-top:0.6rem;
}

.hero-eyebrow {
  font-family: 'Oswald', sans-serif; font-weight:200;
  font-size: 0.72rem; letter-spacing:0.55em; text-transform:uppercase;
  color: var(--amber);
  opacity:0; animation: fadeUp 0.9s ease 0.2s forwards;
  margin-bottom: 0.8rem;
}

.hero-name {
  font-family: 'Bebas Neue', sans-serif;
  line-height: 0.88;
  opacity:0; animation: fadeUp 0.9s ease 0.4s forwards;
}
.hero-name .first {
  display: block;
  font-size: clamp(5rem, 9vw, 9rem);
  color: var(--cream);
  letter-spacing: 0.04em;
}
.hero-name .last {
  display: block;
  font-size: clamp(5rem, 9vw, 9rem);
  color: var(--amber);
  letter-spacing: 0.04em;
  -webkit-text-stroke: 1px var(--amber);
}

.hero-banner {
  margin-top: 1rem;
  background: var(--amber);
  color: var(--ink);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.95rem;
  letter-spacing: 0.4em;
  padding: 0.4rem 0.8rem;
  display: inline-block;
  opacity:0; animation: fadeUp 0.9s ease 0.55s forwards;
}

.hero-tagline {
  font-family: 'Special Elite', cursive;
  font-size: 0.95rem;
  color: var(--smoke);
  letter-spacing: 0.06em;
  margin-top: 1.5rem; margin-bottom: 2rem;
  opacity:0; animation: fadeUp 0.9s ease 0.7s forwards;
  font-style: italic;
}

.hero-ctas {
  display:flex; gap:0.8rem; flex-wrap:wrap;
  opacity:0; animation: fadeUp 0.9s ease 0.85s forwards;
}
.btn-primary {
  font-family:'Bebas Neue',sans-serif; font-size:1rem;
  letter-spacing:0.25em; color: var(--ink);
  background: var(--amber); border:none;
  padding: 0.75rem 2rem; text-decoration:none;
  transition: background 0.25s, transform 0.2s; cursor:pointer;
}
.btn-primary:hover { background:var(--gold); transform:translateY(-2px); }
.btn-ghost {
  font-family:'Bebas Neue',sans-serif; font-size:1rem;
  letter-spacing:0.25em; color:var(--aged);
  border: 1px solid rgba(196,170,132,0.35);
  padding: 0.75rem 2rem; text-decoration:none;
  transition: border-color 0.25s, color 0.25s; cursor:pointer;
}
.btn-ghost:hover { border-color:var(--amber); color:var(--amber); }

.hero-photo-col {
  position: relative;
  overflow: hidden;
}
.hero-photo-col .photo-bg {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to left, rgba(14,11,7,0.25) 0%, rgba(14,11,7,0.85) 100%),
    linear-gradient(to bottom, rgba(14,11,7,0.15) 0%, rgba(14,11,7,0.75) 100%),
    url('ray-hero.png');
  background-size: cover;
  background-position: center center;
  background-repeat: no-repeat;
}

.vinyl {
  position: absolute; top:2rem; right:2rem;
  width: 200px; height:200px; border-radius:50%;
  background:
    radial-gradient(circle at center, #1a1108 16%, #0d0a06 17%, #0a0806 18%,
      #1a1108 34%, #0d0a06 35%, #0a0806 36%,
      #1a1108 54%, #0d0a06 55%, #0a0806 56%, #1e1408 100%);
  opacity: 0.55;
  animation: spin 40s linear infinite;
  box-shadow: 0 0 50px rgba(200,132,26,0.1);
}
.vinyl::after {
  content:'';
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:38px; height:38px; border-radius:50%;
  background: radial-gradient(circle, var(--amber) 0%, #6b4010 100%);
  opacity:0.8;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ══════════════════════════════
   POSTER DIVIDER BAND
══════════════════════════════ */
.band {
  background: var(--amber);
  padding: 0.6rem 5rem;
  display:flex; align-items:center; gap:3rem;
  overflow:hidden;
}
.band-text {
  font-family:'Bebas Neue',sans-serif;
  font-size:1rem; letter-spacing:0.45em;
  color: var(--ink); white-space:nowrap;
  flex-shrink:0;
}
.band-rule { flex:1; height:1px; background:rgba(14,11,7,0.2); }

/* ══════════════════════════════
   ABOUT
══════════════════════════════ */
.about {
  display:grid; grid-template-columns:1fr 1fr;
  max-width:1300px; margin:0 auto;
  padding: 6rem 5rem; gap:5rem; align-items:center;
}
.about-photo-frame {
  aspect-ratio:3/4;
  background: linear-gradient(160deg, #2e1c06, #1a1108);
  border: 1px dashed rgba(200,132,26,0.2);
  display:flex; align-items:center; justify-content:center;
  font-family:'Oswald',sans-serif; font-weight:200;
  font-size:0.65rem; letter-spacing:0.4em;
  color:rgba(200,132,26,0.3);
  text-align:center;
  position:relative; overflow:hidden;
}
.corner { position:absolute; width:20px; height:20px; }
.corner-tl { top:0; left:0; border-top:2px solid var(--amber); border-left:2px solid var(--amber); }
.corner-tr { top:0; right:0; border-top:2px solid var(--amber); border-right:2px solid var(--amber); }
.corner-bl { bottom:0; left:0; border-bottom:2px solid var(--amber); border-left:2px solid var(--amber); }
.corner-br { bottom:0; right:0; border-bottom:2px solid var(--amber); border-right:2px solid var(--amber); }

.about-text .section-eyebrow {
  font-family:'Bebas Neue',sans-serif;
  font-size:0.9rem; letter-spacing:0.5em;
  color:var(--amber); margin-bottom:1.2rem;
  display:flex; align-items:center; gap:1rem;
}
.section-eyebrow::after {
  content:''; flex:1; height:1px;
  background:linear-gradient(to right, rgba(200,132,26,0.4), transparent);
}

.about-text h2 {
  font-family:'Playfair Display',serif; font-weight:900;
  font-size:clamp(2.2rem,3.5vw,3.2rem);
  line-height:1.1; color:var(--cream);
  margin-bottom:2rem;
}
.about-text h2 em { font-style:italic; color:var(--gold); }

.about-text p {
  font-size:1rem; line-height:1.85; color:var(--aged);
  margin-bottom:1.4rem;
}
.placeholder-copy {
  color:rgba(196,170,132,0.38) !important;
  font-style:italic;
  border-left:2px solid rgba(200,132,26,0.18);
  padding-left:1rem;
  font-size:0.88rem !important;
}

/* ══════════════════════════════
   MUSIC
══════════════════════════════ */
.music {
  background: var(--bourbon);
  padding: 6rem 5rem;
  position:relative; overflow:hidden;
}
.music-inner { max-width:1300px; margin:0 auto; }
.music h2 {
  font-family:'Playfair Display',serif; font-weight:900; font-style:italic;
  font-size:clamp(2.5rem,4vw,3.5rem); color:var(--cream); margin-bottom:3rem;
}

.track {
  display:grid; grid-template-columns:2.5rem 1fr auto auto;
  gap:1.5rem; align-items:center;
  padding:1.1rem 0;
  border-bottom:1px solid rgba(196,170,132,0.07);
  cursor:pointer; transition:padding-left 0.2s;
}
.track:hover { padding-left:0.5rem; background:rgba(200,132,26,0.04); }

.streaming-link {
  font-family:'Bebas Neue',sans-serif; font-size:0.85rem;
  letter-spacing:0.2em; color:var(--amber);
  text-decoration:none; transition:color 0.2s;
}
.streaming-link:hover { color:var(--gold); }

/* ══════════════════════════════
   SHOWS
══════════════════════════════ */
.shows {
  padding: 6rem 5rem;
  max-width:1300px; margin:0 auto;
}
.show {
  display:grid; grid-template-columns:110px 1fr auto;
  gap:2rem; align-items:center;
  padding:1.4rem 0;
  border-bottom:1px solid rgba(196,170,132,0.07);
}

.show-tix {
  font-family:'Bebas Neue',sans-serif; font-size:0.85rem;
  letter-spacing:0.25em; color:var(--amber);
  border:1px solid rgba(200,132,26,0.4);
  padding:0.5rem 1.3rem; text-decoration:none;
  transition:all 0.2s;
}
.show-tix:hover { background:var(--amber); color:var(--ink); }

/* ══════════════════════════════
   CONTACT
══════════════════════════════ */
.contact {
  background: var(--ink);
  padding: 7rem 5rem;
  text-align:center; position:relative;
}

.contact-grid {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:1.5rem; max-width:720px; margin:0 auto;
}
.contact-card {
  border:1px solid rgba(196,170,132,0.1); padding:2rem 1.5rem;
}

/* ══════════════════════════════
   FOOTER + NULL POINT LOGO
══════════════════════════════ */
footer {
  background: #080604;
  border-top:1px solid rgba(196,170,132,0.07);
  padding:3rem 5rem;
  display:flex; justify-content:space-between; align-items:center;
}

.footer-credits {
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
}

.footer-credits p {
  font-family:'Oswald',sans-serif; font-weight:200;
  font-size:0.68rem; letter-spacing:0.25em;
  text-transform:uppercase; color:var(--smoke);
}
.footer-credits p span { color:var(--amber); }

/* Stylized Signature for Null Point Design */
.npd-signature {
  display: flex;
  align-items: center;
  gap: 0.7rem;
  text-decoration: none;
}

.npd-logo-box {
  width: 26px; height: 26px;
  border: 1px solid var(--amber);
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.npd-logo-box span {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.8rem; color: var(--amber);
  margin-top: 1px;
}
.npd-logo-box::after {
  content: ''; position: absolute;
  width: 3px; height: 3px; background: var(--amber);
  bottom: 4px; right: 4px;
}

.npd-text {
  font-family: 'Oswald', sans-serif;
  font-size: 0.65rem; font-weight: 300;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--smoke);
}
.npd-text b { color: var(--aged); font-weight: 600; }

.social-row { display:flex; gap:1.5rem; }
.social-row a {
  font-family:'Bebas Neue',sans-serif; font-size:0.8rem;
  letter-spacing:0.2em; color:var(--smoke);
  text-decoration:none; transition:color 0.2s;
}
.social-row a:hover { color:var(--amber); }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

@media (max-width:768px) {
  nav { padding:1rem 1.5rem; }
  .nav-links { display:none; }
  .hero { grid-template-columns:1fr; }
  .hero-photo-col { display:none; }
  .about { grid-template-columns:1fr; padding:4rem 2rem; }
  .contact-grid { grid-template-columns:1fr; }
  footer { flex-direction:column; gap:2rem; padding:3rem 2rem; text-align:center; }
  .footer-credits { align-items: center; }
}
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-wordmark">Ray Martin</a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#music">Music</a></li>
    <li><a href="#shows">Shows</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<section class="hero" id="home">
  <div class="hero-text-col">
    <div class="poster-rule"></div>
    <p class="hero-eyebrow">Nashville, Tennessee</p>
    <h1 class="hero-name">
      <span class="first">Ray</span>
      <span class="last">Martin</span>
    </h1>
    <div class="hero-banner">
      Blues · Rock · Nashville
    </div>
    <div class="poster-rule thin"></div>
    <p class="hero-tagline">"The real stuff, played loud and played right."</p>
    <div class="hero-ctas">
      <a href="#music" class="btn-primary">Listen</a>
      <a href="#shows" class="btn-ghost">Upcoming Shows</a>
    </div>
    <div class="poster-rule" style="margin-top:2rem;margin-bottom:0;"></div>
  </div>

  <div class="hero-photo-col">
    <div class="photo-bg"></div>
    <div class="vinyl"></div>
  </div>
</section>

<footer>
  <div class="footer-credits">
    <p>© 2026 <span>Ray Martin</span> · Nashville, TN</p>
    
    <a href="https://nullpointdesign.github.io" class="npd-signature">
      <div class="npd-logo-box"><span>N</span></div>
      <div class="npd-text">Project by <b>Null Point Design</b></div>
    </a>
  </div>

  <div class="social-row">
    <a href="#">Instagram</a>
    <a href="#">Facebook</a>
    <a href="#">Spotify</a>
    <a href="#">YouTube</a>
  </div>
</footer>

</body>
</html>
